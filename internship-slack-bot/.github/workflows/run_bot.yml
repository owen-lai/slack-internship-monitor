name: Internship Monitor

on:
  push:
    branches: [main]
  schedule:
    # Every 5 minutes — GH Actions minimum granularity
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual runs from the Actions UI

jobs:
  check-internships:
    runs-on: ubuntu-latest
    timeout-minutes: 4   # fail fast if something hangs

    steps:
      - name: Checkout bot repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache seen_ids.json between runs so we never re-announce a posting.
      # The cache key includes the date so it refreshes daily at most,
      # but restore-keys lets us fall back to yesterday's cache.
      - name: Restore seen-IDs cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            seen-ids-${{ runner.os }}-

      - name: Run single check cycle
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GITHUB_REPO_URL: https://github.com/vanshb03/Summer2026-Internships
          RUN_ONCE: "true"
        run: python mainbot.py
